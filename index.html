<script>
let step = 0;
let yesSize = 1;
let noSize = 1; // 👈 controls shrinking

function start() {
  step = 1;
  render();
  startHearts();
}

function typeText(text, callback) {
  let i = 0;
  const app = document.getElementById('app');
  app.innerHTML = `<p id="typing"></p>`;
  const el = document.getElementById('typing');

  const interval = setInterval(() => {
    el.innerHTML += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(interval);
      if(callback) callback();
    }
  }, 25);
}

// 🎯 random position
function randomPosition() {
  const x = Math.random() * (window.innerWidth - 120);
  const y = Math.random() * (window.innerHeight - 60);
  return `left:${x}px; top:${y}px;`;
}

// ❌ shrinking NO button
function noBtn(label="no", action="next()") {
  return `<button class="red random-no" 
    style="${randomPosition()}; transform: scale(${noSize})"
    onclick="${action}">
    ${label}
  </button>`;
}

function render() {
  const app = document.getElementById('app');
  const body = document.body;

  body.classList.remove('pink-bg');

  if(step === 1) {
    typeText("Hi Seleira, I know that I've been making loads of mistakes lately.", () => {
      app.innerHTML += `<br><button onclick="next()">continue</button>`;
    });
  }

  else if(step === 2) {
    typeText("I don't know lately naging lazy ako and nakakatulog ako often buntis ata ako eh.", () => {
      app.innerHTML += `<br><button onclick="next()">continue</button>`;
    });
  }

  else if(step === 3) {
    typeText("Kidding aside, wala man akong masyadong mabigay talaga but I know what to do to bawi and change myself into a better man.", () => {
      app.innerHTML += `<br><button onclick="next()">continue</button>`;
    });
  }

  else if(step === 4) {
    body.classList.add('pink-bg');
    app.innerHTML = `
      <div class="fade">
      <img src="meme1.jpg">
      <p>I know that you're still thinking about what happened talaga but will you ever forgive me?</p>
      <button class="green" onclick="yesPath()">yes</button>
      ${noBtn("no", "noPath1()")}
      </div>`;
  }

  else if(step === 5) {
    body.classList.add('pink-bg');
    app.innerHTML = `<div class="fade"><p>really?</p>
    <button class="green big" onclick="finalPage()">yes</button></div>`;
  }

  else if(step === 6) {
    body.classList.add('pink-bg');
    noSize -= 0.15; // 👈 shrink
    app.innerHTML = `<div class="fade">
    <img src="meme2.jpg">
    <p>really? huhu whyyy</p>
    <button class="green big" onclick="yesPath()">okay fine</button>
    ${noBtn("still no")}
    </div>`;
  }

  else if(step === 7) {
    body.classList.add('pink-bg');
    yesSize += 0.2;
    noSize -= 0.15;
    app.innerHTML = `<div class="fade">
    <img src="meme3.jpg">
    <p>huhuuu my honey bunch sugar plum ayaw mo talaga?</p>
    <button class="green" style="transform: scale(${yesSize})" onclick="yesPath()">okay fine</button>
    ${noBtn("still no")}
    </div>`;
  }

  else if(step === 8) {
    body.classList.add('pink-bg');
    yesSize += 0.2;
    noSize -= 0.15;
    app.innerHTML = `<div class="fade">
    <img src="meme4.jpg">
    <p>eto nalang, kiss kita marami hehe</p>
    <button class="green" style="transform: scale(${yesSize})" onclick="yesPath()">okay, yung may tunog ha?</button>
    ${noBtn("ayoko")}
    </div>`;
  }

  else if(step === 9) {
    body.classList.add('pink-bg');
    yesSize += 0.2;
    noSize -= 0.15;
    app.innerHTML = `<div class="fade">
    <img src="meme5.jpg">
    <p>huhuuuu whhyyyyy I'm sorry naaa pleaseee</p>
    <button class="green" style="transform: scale(${yesSize})" onclick="yesPath()">yes</button>
    ${noBtn("no")}
    </div>`;
  }

  else if(step === 10) {
    body.classList.add('pink-bg');
    yesSize += 0.3;
    noSize -= 0.2;
    app.innerHTML = `<div class="fade">
    <p>please, I'm sorry na uwu U A U A U A</p>
    <button class="green" style="transform: scale(${yesSize})" onclick="forceYes()">yes</button>
    ${noBtn("no")}
    </div>`;
  }

  else if(step === 11) {
    body.classList.add('pink-bg');
    app.innerHTML = `<div class="fade"><p>hmp, okay you leave me no choice</p>
    <button onclick="next()">continue</button></div>`;
  }

  else if(step === 12) {
    body.classList.add('pink-bg');
    app.innerHTML = `<div class="fade"><p>:P</p>
    <button class="green big" onclick="finalPage()">yes</button>
    <button class="green big" onclick="finalPage()">yes</button></div>`;
  }
}

function next() { step++; render(); }
function yesPath() { step = 5; render(); }
function noPath1() { step = 6; render(); }
function forceYes() { step = 11; render(); }

function finalPage() {
  const app = document.getElementById('app');
  document.body.classList.add('pink-bg');
  app.innerHTML = `
    <div class="fade">
    <h2>I'm really sorry ❤️</h2>
    <p>
    Seleira, I know I hurt you and I regret it so much...<br><br>
    I'm trying to change and be better for you, because you mean everything to me.<br><br>
    Thank you for staying. I love you always.
    </p>

    <img src="your-image1.jpg">
    <img src="your-image2.jpg">

    <audio controls autoplay loop>
      <source src="tugon.mp3" type="audio/mpeg">
    </audio>
    </div>
  `;
}

function startHearts() {
  setInterval(() => {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerHTML = '💖';
    heart.style.left = Math.random() * window.innerWidth + 'px';
    heart.style.animationDuration = (3 + Math.random() * 5) + 's';
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 8000);
  }, 300);
}
</script>
